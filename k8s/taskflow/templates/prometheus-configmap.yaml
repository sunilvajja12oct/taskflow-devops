apiVersion: v1
kind: ConfigMap
metadata:
  name: taskflow-prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/rules.yml
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
      - job_name: taskflow-app
        metrics_path: /metrics
        static_configs:
          - targets: ["taskflow:80"]
  rules.yml: |
    groups:
      - name: taskflow.slo
        rules:
          - alert: TaskFlowHighErrorRate
            expr: |
              sum(rate(http_requests_total{status_code=~"5.."}[5m]))
              /
              sum(rate(http_requests_total[5m])) > 0.01
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "TaskFlow 5xx rate above 1% over 5m"
              description: "See SLO 1 in docs/runbooks - availability budget is being burned."
          - alert: TaskFlowHighLatencyP95
            expr: |
              histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 0.5
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "TaskFlow p95 latency above 500ms over 5m"
              description: "See SLO 2 in docs/runbooks - latency budget is being burned."
          - alert: TaskFlowAppDown
            expr: up{job="taskflow-app"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Prometheus can't scrape the taskflow app at all"
