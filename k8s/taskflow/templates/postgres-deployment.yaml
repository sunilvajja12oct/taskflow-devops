apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate # single ReadWriteOnce PVC - never run two Postgres pods at once
  selector:
    matchLabels:
      app: taskflow-postgres
  template:
    metadata:
      labels:
        app: taskflow-postgres
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image }}"
          ports:
            - containerPort: 5432
          # Deliberately no envFrom here (unlike the app deployment) - the
          # taskflow-db secret's PGHOST points at this Service's own DNS
          # name, and pg_isready respects PGHOST automatically. Pulling it
          # in via envFrom made the readiness probe check the Service
          # instead of localhost - which only routes to Ready pods, a
          # deadlock this pod could never escape. Only the three POSTGRES_*
          # vars the postgres image itself needs are set below.
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: { name: taskflow-db, key: PGUSER }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: taskflow-db, key: PGPASSWORD }
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef: { name: taskflow-db, key: PGDATABASE }
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: taskflow-postgres-data
