apiVersion: v1
kind: ConfigMap
metadata:
  name: taskflow-grafana-provisioning
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://taskflow-prometheus:9090
        isDefault: true
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: taskflow
        folder: TaskFlow
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: taskflow-grafana-dashboards
data:
  taskflow.json: |
    {
      "title": "TaskFlow",
      "uid": "taskflow-slo",
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "10s",
      "time": { "from": "now-30m", "to": "now" },
      "panels": [
        {
          "id": 1, "title": "Request rate (req/s)", "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [{ "expr": "sum(rate(http_requests_total[1m])) by (route)", "legendFormat": "{{ "{{" }}route{{ "}}" }}" }]
        },
        {
          "id": 2, "title": "Error rate (5xx / total)", "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [{ "expr": "sum(rate(http_requests_total{status_code=~\"5..\"}[5m])) / sum(rate(http_requests_total[5m]))", "legendFormat": "error ratio" }]
        },
        {
          "id": 3, "title": "p95 latency (s)", "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [{ "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p95" }]
        },
        {
          "id": 4, "title": "App reachable through Service (1=yes)", "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [{ "expr": "up{job=\"taskflow-app\"}", "legendFormat": "up" }]
        }
      ]
    }
