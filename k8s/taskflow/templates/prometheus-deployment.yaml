apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskflow-prometheus
  template:
    metadata:
      labels:
        app: taskflow-prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=6h
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: taskflow-prometheus-config
