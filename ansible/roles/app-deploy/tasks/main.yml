---
- name: Create app directory
  ansible.builtin.file:
    path: /opt/taskflow
    state: directory
    mode: '0755'

- name: Drop a version marker
  ansible.builtin.copy:
    content: "app-deploy role - real deploy via Helm, Phase 6\n"
    dest: /opt/taskflow/VERSION
    mode: '0644'

- name: Copy Helm chart to the node
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../k8s/taskflow"
    dest: /home/ec2-user/taskflow-chart
    mode: '0755'
