---
- name: Disable root SSH login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin no'
  notify: Restart sshd

- name: Install dnf-automatic for unattended security updates
  ansible.builtin.dnf:
    name: dnf-automatic
    state: present

- name: Configure dnf-automatic to apply security updates automatically
  ansible.builtin.lineinfile:
    path: /etc/dnf/automatic.conf
    regexp: '^apply_updates'
    line: 'apply_updates = yes'

- name: Enable dnf-automatic timer
  ansible.builtin.systemd:
    name: dnf-automatic.timer
    enabled: true
    state: started

- name: Install fail2ban
  ansible.builtin.dnf:
    name: fail2ban
    state: present

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started

- name: Record ops contact (proves Vault decryption worked)
  ansible.builtin.copy:
    content: "{{ admin_notification_email }}\n"
    dest: /etc/taskflow-ops-contact
    mode: '0600'
