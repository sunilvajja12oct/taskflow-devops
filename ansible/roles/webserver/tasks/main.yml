---
- name: Install nginx
  ansible.builtin.dnf:
    name: nginx
    state: present

- name: Deploy placeholder index page
  ansible.builtin.template:
    src: index.html.j2
    dest: /usr/share/nginx/html/index.html
    mode: '0644'

- name: Enable and start nginx
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
