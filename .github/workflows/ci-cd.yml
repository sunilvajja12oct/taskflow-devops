name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      account_id: ${{ steps.resolve.outputs.account_id }}
      ecr_repo: ${{ steps.resolve.outputs.ecr_repo }}
      state_bucket: ${{ steps.resolve.outputs.state_bucket }}
      ansible_bucket: ${{ steps.resolve.outputs.ansible_bucket }}
      ops_topic_arn: ${{ steps.resolve.outputs.ops_topic_arn }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Resolve everything dynamically - no hardcoded IDs anywhere else in this file
        id: resolve
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "ecr_repo=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/taskflow-dev" >> $GITHUB_OUTPUT
          echo "state_bucket=taskflow-tfstate-$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "ansible_bucket=taskflow-dev-ansible-ssm-$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "ops_topic_arn=arn:aws:sns:$AWS_REGION:$ACCOUNT_ID:taskflow-dev-ops-alerts" >> $GITHUB_OUTPUT
          # Deliberately NOT resolving instance_id here: this job runs before
          # `apply`, so on a from-scratch environment the instance doesn't
          # exist yet and this would silently capture an empty ID that every
          # later job would then be stuck with (GitHub Actions job outputs
          # are fixed at job completion, never re-evaluated). Instance
          # resolution happens in `bootstrap`, after `apply` has run.

  lint-scan:
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: terraform fmt check
        run: terraform -chdir=terraform/envs/dev fmt -check -recursive
      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: true
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  terraform-plan:
    needs: [resolve, lint-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - uses: hashicorp/setup-terraform@v3
      - name: terraform init
        working-directory: terraform/envs/dev
        run: terraform init -backend-config="bucket=${{ needs.resolve.outputs.state_bucket }}"
      - name: terraform plan
        working-directory: terraform/envs/dev
        run: terraform plan -var-file=dev.tfvars -no-color -out=tfplan | tee plan_output.txt
      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/envs/dev/plan_output.txt', 'utf8').slice(0, 60000);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan\n\`\`\`\n${plan}\n\`\`\``
            });

  apply:
    needs: [resolve, terraform-plan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - uses: hashicorp/setup-terraform@v3
      - name: terraform apply
        working-directory: terraform/envs/dev
        env:
          TF_VAR_ssh_public_key_override: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          terraform init -backend-config="bucket=${{ needs.resolve.outputs.state_bucket }}"
          terraform apply -var-file=dev.tfvars -auto-approve

  bootstrap:
    needs: [resolve, apply]
    runs-on: ubuntu-latest
    outputs:
      instance_id: ${{ steps.resolve-instance.outputs.instance_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Resolve instance (post-apply, so a freshly created one is found)
        id: resolve-instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=taskflow-dev-app-01" "Name=instance-state-name,Values=running" \
            --region $AWS_REGION --query "Reservations[].Instances[].InstanceId" --output text)
          if [ -z "$INSTANCE_ID" ] || [ "$(echo "$INSTANCE_ID" | wc -w)" -gt 1 ]; then
            echo "::error::Expected exactly one running instance, got: '$INSTANCE_ID'"
            exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
      - name: Wait for SSM agent online
        env:
          INSTANCE_ID: ${{ steps.resolve-instance.outputs.instance_id }}
        run: |
          for i in $(seq 1 18); do
            STATUS=$(aws ssm describe-instance-information --region $AWS_REGION \
              --query "InstanceInformationList[?InstanceId=='$INSTANCE_ID'].PingStatus" --output text)
            [ "$STATUS" == "Online" ] && exit 0
            sleep 10
          done
          echo "::error::SSM agent on $INSTANCE_ID never came online"
          exit 1
      - name: Sync Helm chart to the relay bucket
        run: aws s3 sync k8s/taskflow s3://${{ needs.resolve.outputs.ansible_bucket }}/chart --delete --region $AWS_REGION

  build-scan-push:
    needs: [resolve, apply]
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - id: tag
        run: echo "tag=v1.0.${{ github.run_number }}-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Build image
        working-directory: app
        run: docker build -t taskflow:${{ steps.tag.outputs.tag }} .
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: taskflow:${{ steps.tag.outputs.tag }}
          severity: CRITICAL,HIGH
          exit-code: 0
      - name: Push to ECR
        env:
          ECR_REPO: ${{ needs.resolve.outputs.ecr_repo }}
        run: |
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REPO
          docker tag taskflow:${{ steps.tag.outputs.tag }} $ECR_REPO:${{ steps.tag.outputs.tag }}
          docker push $ECR_REPO:${{ steps.tag.outputs.tag }}

  deploy:
    needs: [resolve, bootstrap, build-scan-push]
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Deploy via SSM
        env:
          INSTANCE_ID: ${{ needs.bootstrap.outputs.instance_id }}
          ECR_REPO: ${{ needs.resolve.outputs.ecr_repo }}
          CHART_BUCKET: ${{ needs.resolve.outputs.ansible_bucket }}
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids $INSTANCE_ID \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"for i in \$(seq 1 30); do [ -f /opt/taskflow/bootstrap-complete ] && break; sleep 10; done\", \"aws s3 sync s3://$CHART_BUCKET/chart /home/ec2-user/taskflow-chart --delete\", \"export KUBECONFIG=/etc/rancher/k3s/k3s.yaml && kubectl create secret docker-registry ecr-pull-secret --docker-server=$ECR_REPO --docker-username=AWS --docker-password=\$(aws ecr get-login-password --region $AWS_REGION) --dry-run=client -o yaml | kubectl apply -f -\", \"export KUBECONFIG=/etc/rancher/k3s/k3s.yaml && cd /home/ec2-user/taskflow-chart && helm upgrade --install taskflow . --set image.repository=$ECR_REPO --set image.tag=${{ needs.build-scan-push.outputs.image_tag }}\"]" \
            --region $AWS_REGION --query "Command.CommandId" --output text)
          # Poll for a terminal status instead of a fixed sleep + unconditional
          # success: get-command-invocation itself returns 0 even when the
          # remote command failed, so without this check the step always
          # reports green regardless of whether helm upgrade actually worked.
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation --instance-id $INSTANCE_ID --command-id $CMD_ID --region $AWS_REGION --query "Status" --output text 2>/dev/null)
            case "$STATUS" in
              Success) echo "Deploy succeeded"; exit 0 ;;
              Failed|Cancelled|TimedOut) break ;;
            esac
            sleep 10
          done
          echo "::error::Deploy did not succeed (status: $STATUS)"
          aws ssm get-command-invocation --instance-id $INSTANCE_ID --command-id $CMD_ID --region $AWS_REGION
          exit 1

  smoke-test:
    needs: [resolve, bootstrap, deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Health check via SSM
        env:
          INSTANCE_ID: ${{ needs.bootstrap.outputs.instance_id }}
        run: |
          # Retries because a rolling update needs a few seconds for the new
          # pod to pass its readiness probe. Each SSM command is one-shot, so
          # a failed curl means re-sending, not re-polling the same command.
          for i in $(seq 1 12); do
            CMD_ID=$(aws ssm send-command \
              --instance-ids $INSTANCE_ID \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=["curl -sf -H \"Host: taskflow.local\" http://localhost/health"]' \
              --region $AWS_REGION --query "Command.CommandId" --output text)
            sleep 8
            STATUS=$(aws ssm get-command-invocation --instance-id $INSTANCE_ID --command-id $CMD_ID --region $AWS_REGION --query "Status" --output text 2>/dev/null)
            if [ "$STATUS" == "Success" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 7
          done
          echo "::error::Health check never succeeded after retries (last status: $STATUS)"
          aws ssm get-command-invocation --instance-id $INSTANCE_ID --command-id $CMD_ID --region $AWS_REGION
          exit 1

  notify:
    needs: [resolve, smoke-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Notify via SNS
        run: |
          STATUS="${{ needs.smoke-test.result }}"
          aws sns publish --topic-arn ${{ needs.resolve.outputs.ops_topic_arn }} \
            --subject "TaskFlow deploy: $STATUS" \
            --message "Pipeline run ${{ github.run_number }} finished with status: $STATUS" \
            --region $AWS_REGION
